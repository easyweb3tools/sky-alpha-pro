app:
  name: sky-alpha-pro
  env: dev
  version: 0.1.0

server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 10s
  read_header_timeout: 5s
  write_timeout: 15s
  shutdown_timeout: 10s

market:
  gamma_base_url: https://gamma-api.polymarket.com
  clob_base_url: https://clob.polymarket.com
  weather_tag: weather
  sync_limit: 100
  request_timeout: 12s

weather:
  nws_base_url: https://api.weather.gov
  openmeteo_base_url: https://api.open-meteo.com
  openmeteo_geocoding_base_url: https://geocoding-api.open-meteo.com
  visualcrossing_base_url: https://weather.visualcrossing.com
  visualcrossing_api_key: ""
  request_timeout: 12s
  user_agent: sky-alpha-pro/0.1.0

database:
  host: 127.0.0.1
  port: 5432
  user: postgres
  password: postgres
  name: sky_alpha_pro
  sslmode: disable
  timezone: UTC
  max_open_conns: 25
  max_idle_conns: 5

log:
  level: info
  encoding: console
