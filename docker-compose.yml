services:
  app:
    image: ${APP_IMAGE:-ghcr.io/easyweb3tools/sky-alpha-pro:1.0.0}
    container_name: sky-alpha-pro
    restart: unless-stopped
    command: ["serve"]
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    environment:
      # app
      SKY_ALPHA_APP_NAME: ${SKY_ALPHA_APP_NAME:-sky-alpha-pro}
      SKY_ALPHA_APP_ENV: ${SKY_ALPHA_APP_ENV:-prod}
      SKY_ALPHA_APP_VERSION: ${SKY_ALPHA_APP_VERSION:-0.1.0}

      # server
      SKY_ALPHA_SERVER_HOST: ${SKY_ALPHA_SERVER_HOST:-0.0.0.0}
      SKY_ALPHA_SERVER_PORT: ${SKY_ALPHA_SERVER_PORT:-8080}
      SKY_ALPHA_SERVER_READ_TIMEOUT: ${SKY_ALPHA_SERVER_READ_TIMEOUT:-10s}
      SKY_ALPHA_SERVER_READ_HEADER_TIMEOUT: ${SKY_ALPHA_SERVER_READ_HEADER_TIMEOUT:-5s}
      SKY_ALPHA_SERVER_WRITE_TIMEOUT: ${SKY_ALPHA_SERVER_WRITE_TIMEOUT:-15s}
      SKY_ALPHA_SERVER_SHUTDOWN_TIMEOUT: ${SKY_ALPHA_SERVER_SHUTDOWN_TIMEOUT:-10s}

      # log
      SKY_ALPHA_LOG_LEVEL: ${SKY_ALPHA_LOG_LEVEL:-info}
      SKY_ALPHA_LOG_ENCODING: ${SKY_ALPHA_LOG_ENCODING:-console}

      # database
      SKY_ALPHA_DATABASE_HOST: ${DB_HOST:-postgres}
      SKY_ALPHA_DATABASE_PORT: ${DB_PORT:-5432}
      SKY_ALPHA_DATABASE_USER: ${DB_USER:-postgres}
      SKY_ALPHA_DATABASE_PASSWORD: ${DB_PASSWORD:?set in .env}
      SKY_ALPHA_DATABASE_NAME: ${DB_NAME:-sky_alpha_pro}
      SKY_ALPHA_DATABASE_SSLMODE: ${DB_SSLMODE:-disable}
      SKY_ALPHA_DATABASE_TIMEZONE: ${SKY_ALPHA_DATABASE_TIMEZONE:-UTC}
      SKY_ALPHA_DATABASE_MAX_OPEN_CONNS: ${SKY_ALPHA_DATABASE_MAX_OPEN_CONNS:-25}
      SKY_ALPHA_DATABASE_MAX_IDLE_CONNS: ${SKY_ALPHA_DATABASE_MAX_IDLE_CONNS:-5}

      # market
      SKY_ALPHA_MARKET_GAMMA_BASE_URL: ${SKY_ALPHA_MARKET_GAMMA_BASE_URL:-https://gamma-api.polymarket.com}
      SKY_ALPHA_MARKET_CLOB_BASE_URL: ${SKY_ALPHA_MARKET_CLOB_BASE_URL:-https://clob.polymarket.com}
      SKY_ALPHA_MARKET_WEATHER_TAG: ${SKY_ALPHA_MARKET_WEATHER_TAG:-weather}
      SKY_ALPHA_MARKET_SYNC_LIMIT: ${SKY_ALPHA_MARKET_SYNC_LIMIT:-100}
      SKY_ALPHA_MARKET_REQUEST_TIMEOUT: ${SKY_ALPHA_MARKET_REQUEST_TIMEOUT:-12s}

      # weather
      SKY_ALPHA_WEATHER_NWS_BASE_URL: ${SKY_ALPHA_WEATHER_NWS_BASE_URL:-https://api.weather.gov}
      SKY_ALPHA_WEATHER_OPENMETEO_BASE_URL: ${SKY_ALPHA_WEATHER_OPENMETEO_BASE_URL:-https://api.open-meteo.com}
      SKY_ALPHA_WEATHER_OPENMETEO_GEOCODING_BASE_URL: ${SKY_ALPHA_WEATHER_OPENMETEO_GEOCODING_BASE_URL:-https://geocoding-api.open-meteo.com}
      SKY_ALPHA_WEATHER_OPENMETEO_MODELS: ${SKY_ALPHA_WEATHER_OPENMETEO_MODELS:-}
      SKY_ALPHA_WEATHER_VISUALCROSSING_BASE_URL: ${SKY_ALPHA_WEATHER_VISUALCROSSING_BASE_URL:-https://weather.visualcrossing.com}
      SKY_ALPHA_WEATHER_VISUALCROSSING_API_KEY: ${SKY_ALPHA_WEATHER_VISUALCROSSING_API_KEY:-}
      SKY_ALPHA_WEATHER_REQUEST_TIMEOUT: ${SKY_ALPHA_WEATHER_REQUEST_TIMEOUT:-12s}
      SKY_ALPHA_WEATHER_USER_AGENT: ${SKY_ALPHA_WEATHER_USER_AGENT:-sky-alpha-pro/0.1.0}

      # signal
      SKY_ALPHA_SIGNAL_MIN_EDGE_PCT: ${SKY_ALPHA_SIGNAL_MIN_EDGE_PCT:-5.0}
      SKY_ALPHA_SIGNAL_MAX_MARKETS: ${SKY_ALPHA_SIGNAL_MAX_MARKETS:-500}
      SKY_ALPHA_SIGNAL_DEFAULT_LIMIT: ${SKY_ALPHA_SIGNAL_DEFAULT_LIMIT:-50}
      SKY_ALPHA_SIGNAL_CONCURRENCY: ${SKY_ALPHA_SIGNAL_CONCURRENCY:-10}
      SKY_ALPHA_SIGNAL_FORECAST_MAX_AGE_HOURS: ${SKY_ALPHA_SIGNAL_FORECAST_MAX_AGE_HOURS:-24}
      SKY_ALPHA_SIGNAL_MIN_SIGMA: ${SKY_ALPHA_SIGNAL_MIN_SIGMA:-0.5}
      SKY_ALPHA_SIGNAL_CITY_RESOLVER_USE_VERTEX: ${SKY_ALPHA_SIGNAL_CITY_RESOLVER_USE_VERTEX:-false}

      # agent (Vertex AI)
      SKY_ALPHA_AGENT_ANALYZE_LIMIT: ${SKY_ALPHA_AGENT_ANALYZE_LIMIT:-20}
      SKY_ALPHA_AGENT_CONCURRENCY: ${SKY_ALPHA_AGENT_CONCURRENCY:-8}
      SKY_ALPHA_AGENT_MARKET_TIMEOUT: ${SKY_ALPHA_AGENT_MARKET_TIMEOUT:-20s}
      SKY_ALPHA_AGENT_MAX_FORECAST_DAYS: ${SKY_ALPHA_AGENT_MAX_FORECAST_DAYS:-10}
      SKY_ALPHA_AGENT_ALLOW_LEGACY_VERTEX_ANALYZE: ${SKY_ALPHA_AGENT_ALLOW_LEGACY_VERTEX_ANALYZE:-false}
      SKY_ALPHA_AGENT_VERTEX_API_KEY: ${SKY_ALPHA_AGENT_VERTEX_API_KEY:-}
      SKY_ALPHA_AGENT_VERTEX_PROJECT: ${SKY_ALPHA_AGENT_VERTEX_PROJECT:-}
      SKY_ALPHA_AGENT_VERTEX_LOCATION: ${SKY_ALPHA_AGENT_VERTEX_LOCATION:-us-central1}
      SKY_ALPHA_AGENT_VERTEX_MODEL: ${SKY_ALPHA_AGENT_VERTEX_MODEL:-gemini-2.5-flash}
      SKY_ALPHA_AGENT_VERTEX_TEMPERATURE: ${SKY_ALPHA_AGENT_VERTEX_TEMPERATURE:-0.2}
      SKY_ALPHA_AGENT_VERTEX_MAX_OUTPUT_TOKENS: ${SKY_ALPHA_AGENT_VERTEX_MAX_OUTPUT_TOKENS:-600}
      SKY_ALPHA_AGENT_VERTEX_TIMEOUT: ${SKY_ALPHA_AGENT_VERTEX_TIMEOUT:-15s}

      # trade
      SKY_ALPHA_TRADE_PRIVATE_KEY: ${SKY_ALPHA_TRADE_PRIVATE_KEY:-}
      SKY_ALPHA_TRADE_CHAIN_ID: ${SKY_ALPHA_TRADE_CHAIN_ID:-137}
      SKY_ALPHA_TRADE_MAX_ORDER_SIZE: ${SKY_ALPHA_TRADE_MAX_ORDER_SIZE:-0.0}
      SKY_ALPHA_TRADE_MAX_POSITION_SIZE: ${SKY_ALPHA_TRADE_MAX_POSITION_SIZE:-100.0}
      SKY_ALPHA_TRADE_MAX_DAILY_LOSS: ${SKY_ALPHA_TRADE_MAX_DAILY_LOSS:-50.0}
      SKY_ALPHA_TRADE_MIN_EDGE_PCT: ${SKY_ALPHA_TRADE_MIN_EDGE_PCT:-5.0}
      SKY_ALPHA_TRADE_MAX_OPEN_POSITIONS: ${SKY_ALPHA_TRADE_MAX_OPEN_POSITIONS:-10}
      SKY_ALPHA_TRADE_MIN_LIQUIDITY: ${SKY_ALPHA_TRADE_MIN_LIQUIDITY:-1000.0}
      SKY_ALPHA_TRADE_CONFIRMATION_REQUIRED: ${SKY_ALPHA_TRADE_CONFIRMATION_REQUIRED:-true}
      SKY_ALPHA_TRADE_PAPER_MODE: ${SKY_ALPHA_TRADE_PAPER_MODE:-false}

      # sim
      SKY_ALPHA_SIM_INTERVAL: ${SKY_ALPHA_SIM_INTERVAL:-5m}
      SKY_ALPHA_SIM_ORDER_SIZE: ${SKY_ALPHA_SIM_ORDER_SIZE:-1.0}
      SKY_ALPHA_SIM_MIN_EDGE_PCT: ${SKY_ALPHA_SIM_MIN_EDGE_PCT:-5.0}
      SKY_ALPHA_SIM_MAX_POSITIONS: ${SKY_ALPHA_SIM_MAX_POSITIONS:-20}
      SKY_ALPHA_SIM_AUTO_SETTLE: ${SKY_ALPHA_SIM_AUTO_SETTLE:-true}

      # chain
      SKY_ALPHA_CHAIN_RPC_URL: ${SKY_ALPHA_CHAIN_RPC_URL:?set in .env}
      SKY_ALPHA_CHAIN_CHAIN_ID: ${SKY_ALPHA_CHAIN_CHAIN_ID:-137}
      SKY_ALPHA_CHAIN_CTF_EXCHANGE_ADDRESS: ${SKY_ALPHA_CHAIN_CTF_EXCHANGE_ADDRESS:-0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E}
      SKY_ALPHA_CHAIN_NEGRISK_EXCHANGE_ADDRESS: ${SKY_ALPHA_CHAIN_NEGRISK_EXCHANGE_ADDRESS:-0xC5d563A36AE78145C45a50134d48A1215220f80a}
      SKY_ALPHA_CHAIN_SCAN_LOOKBACK_BLOCKS: ${SKY_ALPHA_CHAIN_SCAN_LOOKBACK_BLOCKS:-2000}
      SKY_ALPHA_CHAIN_SCAN_MAX_TX: ${SKY_ALPHA_CHAIN_SCAN_MAX_TX:-2000}
      SKY_ALPHA_CHAIN_BOT_MIN_TRADES: ${SKY_ALPHA_CHAIN_BOT_MIN_TRADES:-8}
      SKY_ALPHA_CHAIN_BOT_MAX_AVG_INTERVAL_SEC: ${SKY_ALPHA_CHAIN_BOT_MAX_AVG_INTERVAL_SEC:-8.0}
      SKY_ALPHA_CHAIN_WATCH_INTERVAL: ${SKY_ALPHA_CHAIN_WATCH_INTERVAL:-30s}

      # scheduler
      SKY_ALPHA_SCHEDULER_ENABLED: ${SKY_ALPHA_SCHEDULER_ENABLED:-true}
      SKY_ALPHA_SCHEDULER_RUN_ON_START: ${SKY_ALPHA_SCHEDULER_RUN_ON_START:-true}
      SKY_ALPHA_SCHEDULER_LOCK_MODE: ${SKY_ALPHA_SCHEDULER_LOCK_MODE:-local}
      SKY_ALPHA_SCHEDULER_LOCK_KEY_PREFIX: ${SKY_ALPHA_SCHEDULER_LOCK_KEY_PREFIX:-7300}
      SKY_ALPHA_SCHEDULER_DEFAULT_TIMEOUT: ${SKY_ALPHA_SCHEDULER_DEFAULT_TIMEOUT:-60s}
      SKY_ALPHA_SCHEDULER_DEFAULT_JITTER_RATIO: ${SKY_ALPHA_SCHEDULER_DEFAULT_JITTER_RATIO:-0.1}
      SKY_ALPHA_SCHEDULER_JOBS_MARKET_SYNC_ENABLED: ${SKY_ALPHA_SCHEDULER_JOBS_MARKET_SYNC_ENABLED:-true}
      SKY_ALPHA_SCHEDULER_JOBS_MARKET_SYNC_INTERVAL: ${SKY_ALPHA_SCHEDULER_JOBS_MARKET_SYNC_INTERVAL:-5m}
      SKY_ALPHA_SCHEDULER_JOBS_MARKET_SYNC_TIMEOUT: ${SKY_ALPHA_SCHEDULER_JOBS_MARKET_SYNC_TIMEOUT:-90s}
      SKY_ALPHA_SCHEDULER_JOBS_MARKET_SYNC_IMMEDIATE: ${SKY_ALPHA_SCHEDULER_JOBS_MARKET_SYNC_IMMEDIATE:-true}
      SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_ENABLED: ${SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_ENABLED:-true}
      SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_INTERVAL: ${SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_INTERVAL:-15m}
      SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_TIMEOUT: ${SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_TIMEOUT:-120s}
      SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_IMMEDIATE: ${SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_IMMEDIATE:-true}
      SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_CITY_CONCURRENCY: ${SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_CITY_CONCURRENCY:-6}
      SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_DAYS: ${SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_DAYS:-7}
      SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_SOURCE: ${SKY_ALPHA_SCHEDULER_JOBS_WEATHER_FORECAST_SOURCE:-all}
      SKY_ALPHA_SCHEDULER_JOBS_CHAIN_SCAN_ENABLED: ${SKY_ALPHA_SCHEDULER_JOBS_CHAIN_SCAN_ENABLED:-true}
      SKY_ALPHA_SCHEDULER_JOBS_CHAIN_SCAN_INTERVAL: ${SKY_ALPHA_SCHEDULER_JOBS_CHAIN_SCAN_INTERVAL:-2m}
      SKY_ALPHA_SCHEDULER_JOBS_CHAIN_SCAN_TIMEOUT: ${SKY_ALPHA_SCHEDULER_JOBS_CHAIN_SCAN_TIMEOUT:-90s}
      SKY_ALPHA_SCHEDULER_JOBS_CHAIN_SCAN_IMMEDIATE: ${SKY_ALPHA_SCHEDULER_JOBS_CHAIN_SCAN_IMMEDIATE:-true}
      SKY_ALPHA_SCHEDULER_JOBS_CHAIN_SCAN_LOOKBACK_BLOCKS: ${SKY_ALPHA_SCHEDULER_JOBS_CHAIN_SCAN_LOOKBACK_BLOCKS:-0}
      SKY_ALPHA_SCHEDULER_JOBS_CHAIN_SCAN_MAX_TX: ${SKY_ALPHA_SCHEDULER_JOBS_CHAIN_SCAN_MAX_TX:-0}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_ENABLED: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_ENABLED:-true}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_INTERVAL: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_INTERVAL:-2m}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_TIMEOUT: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_TIMEOUT:-30s}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_IMMEDIATE: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_IMMEDIATE:-true}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_CONSUME_LIMIT: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_CONSUME_LIMIT:-200}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_DECAY_WATCH_AFTER: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_DECAY_WATCH_AFTER:-45m}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_DECAY_COOLDOWN_AFTER: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_DECAY_COOLDOWN_AFTER:-30m}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_TRIGGER_AGENT: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_TRIGGER_AGENT:-true}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_AGENT_CANDIDATE_LIMIT: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_AGENT_CANDIDATE_LIMIT:-20}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_AGENT_MAX_HOT_MARKETS: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_AGENT_MAX_HOT_MARKETS:-10}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_AGENT_MIN_CANDIDATES: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_AGENT_MIN_CANDIDATES:-1}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_AGENT_MIN_CONSUMED_EVENTS: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_AGENT_MIN_CONSUMED_EVENTS:-1}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_MAX_SIGNAL_WRITES_PER_CYCLE: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_MAX_SIGNAL_WRITES_PER_CYCLE:-5}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_SCORE_EDGE_REF_PCT: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_SCORE_EDGE_REF_PCT:-10.0}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_SCORE_WEIGHT_EDGE: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_SCORE_WEIGHT_EDGE:-0.55}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_SCORE_WEIGHT_LIQUIDITY: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_SCORE_WEIGHT_LIQUIDITY:-0.20}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_SCORE_WEIGHT_FRESHNESS: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_SCORE_WEIGHT_FRESHNESS:-0.15}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_SCORE_WEIGHT_EXPIRY: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_SCORE_WEIGHT_EXPIRY:-0.10}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_SCORE_FRESHNESS_MAX_AGE: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_SCORE_FRESHNESS_MAX_AGE:-2h}
      SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_AGENT_RUN_MODE: ${SKY_ALPHA_SCHEDULER_JOBS_OPPORTUNITY_CYCLE_AGENT_RUN_MODE:-event_driven}
      SKY_ALPHA_SCHEDULER_JOBS_SIM_CYCLE_ENABLED: ${SKY_ALPHA_SCHEDULER_JOBS_SIM_CYCLE_ENABLED:-false}
      SKY_ALPHA_SCHEDULER_JOBS_SIM_CYCLE_INTERVAL: ${SKY_ALPHA_SCHEDULER_JOBS_SIM_CYCLE_INTERVAL:-5m}
      SKY_ALPHA_SCHEDULER_JOBS_SIM_CYCLE_TIMEOUT: ${SKY_ALPHA_SCHEDULER_JOBS_SIM_CYCLE_TIMEOUT:-120s}
      SKY_ALPHA_SCHEDULER_JOBS_SIM_CYCLE_IMMEDIATE: ${SKY_ALPHA_SCHEDULER_JOBS_SIM_CYCLE_IMMEDIATE:-false}
      SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_ENABLED: ${SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_ENABLED:-true}
      SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_INTERVAL: ${SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_INTERVAL:-10m}
      SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_IMMEDIATE: ${SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_IMMEDIATE:-true}
      SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_TIMEOUT: ${SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_TIMEOUT:-120s}
      SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_RUN_MODE: vertex_brain
      SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_TRADE_ENABLED: ${SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_TRADE_ENABLED:-false}
      SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_MAX_TOOL_CALLS: ${SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_MAX_TOOL_CALLS:-12}
      SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_MAX_EXTERNAL_REQUESTS: ${SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_MAX_EXTERNAL_REQUESTS:-200}
      SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_MAX_TOKENS_PER_CYCLE: ${SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_MAX_TOKENS_PER_CYCLE:-12000}
      SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_MAX_CYCLE_DURATION: ${SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_MAX_CYCLE_DURATION:-90s}
      SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_MEMORY_WINDOW: ${SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_MEMORY_WINDOW:-3}
      SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_MARKET_LIMIT: ${SKY_ALPHA_SCHEDULER_JOBS_AGENT_CYCLE_MARKET_LIMIT:-300}

      # metrics
      SKY_ALPHA_METRICS_ENABLED: ${SKY_ALPHA_METRICS_ENABLED:-true}
      SKY_ALPHA_METRICS_PATH: ${SKY_ALPHA_METRICS_PATH:-/metrics}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "3"
    networks:
      - sky-alpha

  postgres:
    image: postgres:16-alpine
    container_name: sky-alpha-postgres
    restart: unless-stopped
    profiles: ["with-postgres"]
    environment:
      POSTGRES_DB: ${DB_NAME:-sky_alpha_pro}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set in .env}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sky_alpha_pro}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sky-alpha

volumes:
  postgres_data:
    name: sky-alpha-postgres-data

networks:
  sky-alpha:
    name: sky-alpha-net
