name: Release Image Build

on:
  push:
    branches:
      - "release/v*"
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "configs/**"
      - "docker-compose.yml"
      - ".github/workflows/release-image.yml"
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          BASE_VERSION="${BRANCH#release/v}"
          SHORT_SHA="${GITHUB_SHA::7}"
          DYNAMIC_VERSION="${BASE_VERSION}-build.${GITHUB_RUN_NUMBER}"
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"

          echo "base_version=${BASE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "dynamic_version=${DYNAMIC_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "image_repo=${IMAGE_REPO}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.dynamic_version }}
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.base_version }}
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.dynamic_version }}
            ${{ steps.meta.outputs.image_repo }}:sha-${{ steps.meta.outputs.short_sha }}
